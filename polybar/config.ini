[colors]
background = #1a1b26
background-alt = #24283b
foreground = #c0caf5
primary = #7aa2f7
secondary = #bb9af7
accent = #9ece6a
alert = #f7768e
disabled = #565f89
magenta = #ad8ee6

[bar/main]
height = 24pt
offset-x = 0px
offset-y = 0px
radius = 12
fixed-center = true
override-redirect = false
wm-restack = bspwm
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
line-color = ${colors.primary}
border-size = 4pt
border-color = #00000000
padding-left = 2
padding-right = 3
module-margin = 0

font-0 = "Iosevka Nerd Font:style=Medium:size=11;3"
font-1 = "Iosevka Nerd Font:size=13;4"
font-2 = "Iosevka Nerd Font:size=16;4"

modules-left = launcher left-cap xworkspaces right-cap
modules-center = xwindow
modules-right = pulseaudio sep battery sep date sep tray exit

cursor-click = pointer
enable-ipc = true


[module/left-cap]
type = custom/text
content = ""
content-font = 2
content-foreground = ${colors.background-alt}

[module/right-cap]
type = custom/text
content = ""
content-font = 2
content-foreground = ${colors.background-alt}

[module/sep]
type = custom/text
content = " | "
content-foreground = ${colors.disabled}


[module/launcher]
type = custom/text
content = "  "
content-font = 2
content-foreground = ${colors.primary}
click-left = rofi -show drun
content-padding = 1

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.secondary}
label-active-underline = ${colors.primary}
label-active-padding = 2

label-occupied = %name%
label-occupied-background = ${colors.background-alt}
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

label-empty = %name%
label-empty-background = ${colors.background-alt}
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = "%title%"
label-maxlen = 40
label-empty = "Desktop"
label-empty-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.foreground}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.secondary}

label-muted = 󰝟 muted
label-muted-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
full-at = 99
low-at = 10
battery = BAT0
adapter = AC
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>

label-charging = %percentage%%
label-discharging = %percentage%%

ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁺
ramp-capacity-2 = 󰁼
ramp-capacity-3 = 󰁾
ramp-capacity-4 = 󰂀
ramp-capacity-5 = 󰁹
ramp-capacity-foreground = ${colors.accent}

animation-charging-0 = 󰂆
animation-charging-1 = 󰂈
animation-charging-2 = 󰂉
animation-charging-3 = 󰂋
animation-charging-foreground = ${colors.magenta}
animation-charging-framerate = 750

[module/date]
type = internal/date
interval = 1
date = "󰥔 %H:%M"
date-alt = "󰃭 %Y-%m-%d"
label-foreground = ${colors.primary}

[module/tray]
type = internal/tray
tray-spacing = 8px
tray-size = 16

[module/exit]
type = custom/text
content = "  "
content-foreground = ${colors.alert}
click-left = i3-msg exit

[settings]
screenchange-reload = true
pseudo-transparency = true
