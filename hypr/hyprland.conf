# ──────────────────────────────────────────────────────────────────
# MONITORS
# ──────────────────────────────────────────────────────────────────

monitor = eDP-1, 1920x1080@144, 0x0, 1


# ──────────────────────────────────────────────────────────────────
# AUTOSTART
# ──────────────────────────────────────────────────────────────────

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/libexec/xdg-desktop-portal-hyprland
exec-once = blueman-applet
exec-once = nm-applet --indicator
exec-once = dunst
exec-once = waybar
exec-once = hyprctl setcursor default 24


# ──────────────────────────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ──────────────────────────────────────────────────────────────────

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,default
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland


# ──────────────────────────────────────────────────────────────────
# GENERAL
# ──────────────────────────────────────────────────────────────────

general {
    gaps_in          = 3
    gaps_out         = 5
    border_size      = 3
    col.active_border   = rgba(7aa2f7ff)
    col.inactive_border = rgba(24283bff)
    resize_on_border = true
    layout           = dwindle
}


# ──────────────────────────────────────────────────────────────────
# DWINDLE LAYOUT
# ──────────────────────────────────────────────────────────────────

dwindle {
    pseudotile     = false
    preserve_split = true
}


# ──────────────────────────────────────────────────────────────────
# INPUT
# ──────────────────────────────────────────────────────────────────

input {
    follow_mouse  = 1
    sensitivity   = 0
    accel_profile = flat        # no pointer acceleration

    # xset r rate 360 25  →  repeat_rate = 25 repeats/sec, repeat_delay = 360ms
    repeat_delay  = 360
    repeat_rate   = 25

    touchpad {
        natural_scroll = true
    }
}


# ──────────────────────────────────────────────────────────────────
# DECORATION
# ──────────────────────────────────────────────────────────────────

decoration {
    rounding          = 6

    active_opacity    = 1.0
    inactive_opacity  = 0.85
    fullscreen_opacity = 1.0

    shadow {
        enabled      = false
    }

    blur {
        enabled           = true
        size              = 5
        passes            = 3
        new_optimizations = true
        xray              = false
    }
}


# ──────────────────────────────────────────────────────────────────
# ANIMATIONS
# ──────────────────────────────────────────────────────────────────

animations {
    enabled = true

    bezier = easeOut, 0.0, 0.9, 0.57, 1.0
    bezier = easeIn,  0.4, 0.0, 1.0,  0.6
    bezier = snap,    0.1, 0.9, 0.2,  1.0

    animation = windowsIn,   1, 4, easeOut, popin 80%
    animation = windowsOut,  1, 4, easeIn,  popin 80%
    animation = windowsMove, 1, 2, snap
    animation = border,      1, 3, easeOut
    animation = workspaces,  1, 3, easeOut, slidevert
    animation = fadeIn,      1, 2, easeOut
    animation = fadeOut,     1, 2, easeIn
    animation = fadeLayers,  1, 2, easeOut
}


# ──────────────────────────────────────────────────────────────────
# MISC
# ──────────────────────────────────────────────────────────────────

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    focus_on_activate        = true
    animate_manual_resizes   = true
}

# ──────────────────────────────────────────────────────────────────
# WORKSPACES
# ──────────────────────────────────────────────────────────────────

workspace = 1,
workspace = 2,
workspace = 3,
workspace = 4,
workspace = 5,
workspace = 6,
workspace = 7,
workspace = 8,
workspace = 9,
workspace = 10,


# ──────────────────────────────────────────────────────────────────
# KEYBINDS
# ──────────────────────────────────────────────────────────────────

$mod = SUPER

# --- Terminal & Apps ---
bind = CTRL ALT, T,   exec, alacritty
bind = $mod, E,       exec, pcmanfm
bind = $mod, R,       exec, rofi -show drun
bind = , Print,       exec, grim -g "$(slurp)" - | wl-copy

# --- Window focus ---
bind = $mod, left,  movefocus, l
bind = $mod, down,  movefocus, d
bind = $mod, up,    movefocus, u
bind = $mod, right, movefocus, r

# --- Move windows ---
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, right, movewindow, r

# --- Fullscreen / floating ---
bind = $mod, F, fullscreen, 0
bind = $mod, T, togglefloating

# --- Close / session ---
bind = ALT, F4,       killactive
bind = $mod SHIFT, E, exit
bind = $mod SHIFT, S, forcerendererreload

# --- Cycle windows ---
bind = ALT, Tab, cyclenext

# --- Workspaces: focus ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# --- Workspaces ---
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
# --- Other binds lol ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- Audio ---
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_SINK@ 5%-
bind = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_SINK@ toggle

# --- Brightness ---
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
